<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proto-Town</title>
  <meta name="description" content="Proto-Town, USA. Tune in to the live broadcast from rural Texas.">
  <meta property="og:title" content="Proto-Town">
  <meta property="og:description" content="Tune in to the live broadcast from Proto-Town, USA.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Main site -->
  <div id="site" class="site">
    <!-- Top status bar -->
    <header class="status-bar">
      <div class="status-left">
        <span class="station-id">PT-01</span>
        <span class="separator">|</span>
        <span class="status-label">PROTO-TOWN BROADCAST</span>
      </div>
      <div class="status-right">
        <span id="stream-status" class="stream-status live">
          <span class="live-dot"></span>
          LIVE
        </span>
        <span class="separator">|</span>
        <span id="clock" class="clock"></span>
      </div>
    </header>

    <!-- Main content: the broadcast window -->
    <main class="broadcast-container">
      <div class="broadcast-window">
        <!-- Window title bar -->
        <div class="window-title-bar">
          <div class="window-title">FEED — PROTO-TOWN, USA</div>
          <div class="window-controls-right">
            <span class="signal-bars">
              <span class="bar bar-1"></span>
              <span class="bar bar-2"></span>
              <span class="bar bar-3"></span>
              <span class="bar bar-4"></span>
            </span>
          </div>
        </div>

        <!-- Video area -->
        <div class="video-wrapper">
          <iframe
            id="livestream"
            src="https://customer-jvitd3fw0f6iv9bm.cloudflarestream.com/71d96000406138bcd6cced6b04863058/iframe?muted=true&autoplay=true"
            title="Proto-Town Live Feed"
            style="border: none;"
            allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
            allowfullscreen="true"
            loading="eager"
          ></iframe>
          <!-- CRT overlay effects -->
          <div class="crt-overlay"></div>
          <div class="scanlines"></div>
          <div class="vignette"></div>
        </div>

        <!-- Video info strip -->
        <div class="info-strip">
          <div class="info-left">
            <span class="rec-indicator">● REC</span>
            <span class="feed-label">CAM-01</span>
          </div>
          <div class="info-right">
            <span id="date-display" class="date-display"></span>
          </div>
        </div>
      </div>

      <!-- Radio Player -->
      <div id="radio-panel" class="radio-panel">
        <div class="radio-bar">
          <div class="radio-bar-left">
            <button id="radio-play-btn" class="radio-play-btn" title="Tune In">
              <span id="radio-play-icon" class="radio-play-icon">&#x25B6;</span>
              <span class="radio-play-label">TUNE IN</span>
            </button>
            <span class="radio-icon">&#x266B;</span>
            <span class="radio-title-text">KLKT 107.9 FM</span>
            <span id="radio-status" class="radio-status">STANDBY</span>
          </div>
          <div class="radio-bar-right">
            <span class="radio-volume-label">VOL</span>
            <input id="radio-volume" type="range" min="0" max="1" step="0.01" value="0.4" class="radio-volume">
          </div>
        </div>
      </div>

    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-left">
        <a href="https://www.proto.town/" target="_blank" rel="noopener">proto.town</a>
      </div>
      <div class="footer-right">
        <span class="footer-coord">32.4°N 97.8°W</span>
      </div>
    </footer>
  </div>

  <script src="js/effects.js"></script>
  <script src="js/radio.js"></script>
</body>
</html>
