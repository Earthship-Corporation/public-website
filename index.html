<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proto-Town</title>
  <meta name="description" content="Proto-Town, USA. Tune in to the live broadcast from rural Texas.">
  <meta property="og:title" content="Proto-Town">
  <meta property="og:description" content="Tune in to the live broadcast from Proto-Town, USA.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Courier+Prime:wght@400;700&family=Alfa+Slab+One&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Boot screen (brief flash on load) -->
  <div id="boot-screen" class="boot-screen">
    <div class="boot-text">
      <p>PROTO-TOWN BROADCAST SYSTEM v1.0</p>
      <p>Initializing feed...</p>
      <p class="boot-blink">▮</p>
    </div>
  </div>

  <!-- Main site -->
  <div id="site" class="site hidden">
    <!-- Top status bar -->
    <header class="status-bar">
      <div class="status-left">
        <span class="station-id">PT-01</span>
        <span class="separator">|</span>
        <span class="status-label">PROTO-TOWN BROADCAST</span>
      </div>
      <div class="status-right">
        <span id="stream-status" class="stream-status live">
          <span class="live-dot"></span>
          LIVE
        </span>
        <span class="separator">|</span>
        <span id="clock" class="clock"></span>
      </div>
    </header>

    <!-- Main content: the broadcast window -->
    <main class="broadcast-container">
      <div class="broadcast-window">
        <!-- Window title bar -->
        <div class="window-title-bar">
          <div class="window-controls">
            <span class="window-btn" title="Close">&#x2715;</span>
            <span class="window-btn" title="Minimize">&#x2012;</span>
            <span class="window-btn" title="Maximize">&#x25A1;</span>
          </div>
          <div class="window-title">FEED — PROTO-TOWN, USA</div>
          <div class="window-controls-right">
            <span class="signal-bars">
              <span class="bar bar-1"></span>
              <span class="bar bar-2"></span>
              <span class="bar bar-3"></span>
              <span class="bar bar-4"></span>
            </span>
          </div>
        </div>

        <!-- Video area -->
        <div class="video-wrapper">
          <iframe
            id="livestream"
            src="https://www.youtube.com/embed/mhJRzQsLZGg?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1"
            title="Proto-Town Live Feed"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            loading="eager"
          ></iframe>
          <!-- CRT overlay effects -->
          <div class="crt-overlay"></div>
          <div class="scanlines"></div>
          <div class="vignette"></div>
        </div>

        <!-- Video info strip -->
        <div class="info-strip">
          <div class="info-left">
            <span class="rec-indicator">● REC</span>
            <span class="feed-label">CAM-01</span>
          </div>
          <div class="info-right">
            <span id="date-display" class="date-display"></span>
          </div>
        </div>
      </div>

      <!-- Branding below the broadcast window -->
      <div class="branding">
        <div class="neon-sign-board">
          <div class="neon-sign-inner">
            <span class="corner-accent tl">✦</span>
            <span class="corner-accent tr">✦</span>
            <span class="corner-accent bl">✦</span>
            <span class="corner-accent br">✦</span>
            <h1 class="neon-proto-town">PROTO-TOWN</h1>
          </div>
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-left">
        <a href="https://www.proto.town/" target="_blank" rel="noopener">proto.town</a>
      </div>
      <div class="footer-right">
        <span class="footer-coord">32.4°N 97.8°W</span>
      </div>
    </footer>
  </div>

  <script src="js/effects.js"></script>
</body>
</html>
